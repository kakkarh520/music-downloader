<!DOCTYPE html>
<html>
<head>
<title>Harsh Music</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
display:flex;
}

/* Sidebar */
.sidebar{
width:220px;
background:#000;
padding:20px;
height:100vh;
position:fixed;
}

.sidebar h2{
color:#1db954;
}

.main{
margin-left:240px;
padding:20px;
flex:1;
}

.searchbar{
margin-bottom:20px;
}

input{
padding:12px;
width:60%;
border-radius:20px;
border:none;
font-size:16px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#1db954;
color:white;
cursor:pointer;
}

/* Song Grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.card{
background:#181818;
padding:15px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.card:hover{
background:#282828;
transform:scale(1.05);
}

/* Bottom Player */
.player{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#181818;
padding:15px;
display:flex;
justify-content:center;
gap:20px;
align-items:center;
}

@media(max-width:768px){
.sidebar{
display:none;
}
.main{
margin-left:0;
}
}
</style>
</head>

<body>

<div class="sidebar">
<h2>🎵 Harsh Music</h2>
<p>Home</p>
<p>Search</p>
<p>Your Library</p>
</div>

<div class="main">

<div class="searchbar">
<input id="song" placeholder="Search songs...">
<button onclick="searchSong()">Search</button>
</div>

<div class="grid" id="results"></div>

</div>

<div class="player">
<button onclick="prev()">⏮</button>
<button onclick="playPause()">▶</button>
<button onclick="next()">⏭</button>
</div>

<iframe id="ytplayer" width="0" height="0"></iframe>

<script>

let songs=[];
let current=0;

function searchSong(){
let q=document.getElementById("song").value;

fetch("/search?q="+q)
.then(res=>res.json())
.then(data=>{
songs=data;
let html="";
data.forEach((s,i)=>{
html+=`
<div class="card" onclick="play(${i})">
<h4>${s.title}</h4>
<p>Click to Play</p>
</div>`;
});
document.getElementById("results").innerHTML=html;
});
}

function play(i){
current=i;
let id=songs[i].id;
document.getElementById("ytplayer").src=
"https://www.youtube.com/embed/"+id+"?autoplay=1";
}

function playPause(){
play(current);
}

function next(){
current=(current+1)%songs.length;
play(current);
}

function prev(){
current=(current-1+songs.length)%songs.length;
play(current);
}

</script>

</body>
</html>
