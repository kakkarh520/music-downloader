<!DOCTYPE html>
<html>
<head>
<title>Harsh Music</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:15px;
font-size:22px;
font-weight:bold;
background:#020617;
text-align:center;
}

.search{
text-align:center;
margin:20px;
}

input{
padding:12px;
width:70%;
border-radius:30px;
border:none;
font-size:16px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#22c55e;
color:white;
cursor:pointer;
}

.song{
padding:12px;
margin:10px;
background:#1e293b;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.song:hover{
background:#334155;
}

/* Spotify Bottom Player */
.player{
position:fixed;
bottom:0;
width:100%;
background:#020617;
padding:15px;
display:flex;
justify-content:center;
align-items:center;
gap:15px;
}

</style>
</head>

<body>

<header>🎵 Harsh Music</header>

<div class="search">
<input id="song" placeholder="Search any song...">
<button onclick="searchSong()">Search</button>
</div>

<div id="results"></div>

<div class="player">
<button onclick="prev()">⏮</button>
<button onclick="playPause()">▶</button>
<button onclick="next()">⏭</button>
</div>

<iframe id="player" width="0" height="0"></iframe>

<script>

let songs=[];
let current=0;
let playing=false;

function searchSong(){
let q=document.getElementById("song").value;

fetch("/search?q="+q)
.then(r=>r.json())
.then(data=>{
songs=data;
let html="";
data.forEach((s,i)=>{
html+=`<div class="song" onclick="play(${i})">${s.title}</div>`;
});
document.getElementById("results").innerHTML=html;
});
}

function play(i){
current=i;
let id=songs[i].id;
document.getElementById("player").src=
"https://www.youtube.com/embed/"+id+"?autoplay=1";
playing=true;
}

function playPause(){
if(!songs.length) return;
play(current);
}

function next(){
current=(current+1)%songs.length;
play(current);
}

function prev(){
current=(current-1+songs.length)%songs.length;
play(current);
}

</script>

</body>
</html>
