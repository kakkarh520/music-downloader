<!DOCTYPE html>
<html>
<head>
<title>Next Level Music</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

input{
padding:12px;
width:300px;
border-radius:8px;
border:none;
}

button{
padding:10px 18px;
margin:8px;
background:#1db954;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

iframe{
margin-top:20px;
}
</style>
</head>

<body>

<h1>🎵 Next Level Music Player</h1>

<input id="song" placeholder="Search any song...">
<button onclick="searchSong()">Search</button>

<div id="results"></div>

<iframe id="player" width="560" height="315"
src=""
frameborder="0"
allowfullscreen>
</iframe>

<script>

function searchSong(){
let q=document.getElementById("song").value;

fetch("/search?q="+q)
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach(song=>{
html+=`<p onclick="play('${song.id}')">${song.title}</p>`;
});
document.getElementById("results").innerHTML=html;
});
}

function play(id){
document.getElementById("player").src =
"https://www.youtube.com/embed/"+id+"?autoplay=1";
}
</script>

</body>
</html>
