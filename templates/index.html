<!DOCTYPE html>
<html>
<head>
<title>Harsh Music</title>
<style>
body{background:#121212;color:white;font-family:Arial;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;padding:20px}
.card{background:#181818;padding:15px;border-radius:10px}
img{width:100%;border-radius:10px}
button{padding:8px 15px;margin-top:10px;border:none;border-radius:6px;background:#1db954;color:white}
</style>
</head>
<body>

<h1>🎵 Harsh Music</h1>

<div class="grid" id="songs"></div>

<script>
fetch("/songs")
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach(song=>{
html+=`
<div class="card">
<img src="${song.image}">
<h3>${song.title}</h3>
<p>${song.artist}</p>
<audio controls src="${song.audio}"></audio>
<br>
<a href="${song.audio}" download>
<button>Download</button>
</a>
</div>
`;
});
document.getElementById("songs").innerHTML=html;
});
</script>

</body>
</html>
